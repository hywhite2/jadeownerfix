name: Build JadeOwnerFix Forge 1.20.1

on:
  push:
    branches:
      - "**"

  pull_request:

  workflow_dispatch:


jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      # 拉取源码
      - name: Checkout
        uses: actions/checkout@v4


      # Java 17
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"


      # Gradle缓存
      - name: Setup Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-


      # 授权gradlew
      - name: Grant execute permission
        run: chmod +x ./gradlew


      # 构建
      - name: Build
        run: ./gradlew clean build --no-daemon


      # 上传构建产物
      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: jadeownerfix-forge-1.20.1
          path: |
            build/libs/*.jar



  release:

    if: github.event_name == 'workflow_dispatch'

    needs: build

    runs-on: ubuntu-latest


    permissions:
      contents: write


    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: jadeownerfix-forge-1.20.1
          path: release


      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: JadeOwnerFix Forge 1.20.1 Build ${{ github.run_number }}
          files: |
            release/*.jar
